<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern 3D Interactive Map</title>
    <script src="//unpkg.com/globe.gl"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="globeViz"></div>

    <div id="info-card" class="hidden">
        <div class="card-header">
            <span id="close-btn">&times;</span>
            <img id="country-flag" src="" alt="Flag">
            <h2 id="country-name">Country Name</h2>
        </div>
        <div class="card-body">
            <p><b>🗣 Language:</b> <span id="lang"></span></p>
            <p><b>👥 Population:</b> <span id="pop"></span></p>
            <p><b>⏰ Timezone:</b> <span id="tz"></span></p>
            <p><b>🏛 Capital:</b> <span id="capital"></span></p>
            <p><b>💰 Currency:</b> <span id="currency"></span></p>
        </div>
    </div>
</body>
</html>
